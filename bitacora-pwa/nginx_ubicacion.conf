server {
    listen 80;
    listen [::]:80;
    server_name ubicacion.sembrandodatos.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ubicacion.sembrandodatos.com;

    # ── SSL / TLS ────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/ubicacion.sembrandodatos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ubicacion.sembrandodatos.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/ubicacion.sembrandodatos.com/chain.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ── Security headers ─────────────────────────────
    add_header Strict-Transport-Security  "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options            "DENY" always;
    add_header X-Content-Type-Options     "nosniff" always;
    add_header X-XSS-Protection           "1; mode=block" always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://apipwa.sembrandodatos.com; img-src 'self' data:;" always;

    # ── Root & static ────────────────────────────────
    root  /var/www/ubicacion;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location ~* \.(png|jpg|jpeg|gif|svg|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # ── Compression ──────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Deny hidden files ────────────────────────────
    location ~ /\. { deny all; return 404; }

    # ── Logs ─────────────────────────────────────────
    access_log /var/log/nginx/ubicacion.access.log;
    error_log  /var/log/nginx/ubicacion.error.log warn;
}
