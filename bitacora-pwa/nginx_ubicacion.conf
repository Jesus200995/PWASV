server {
    listen 80;
    server_name ubicacion.sembrandodatos.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name ubicacion.sembrandodatos.com;

    ssl_certificate     /etc/letsencrypt/live/ubicacion.sembrandodatos.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ubicacion.sembrandodatos.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /var/www/ubicacion;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
}
