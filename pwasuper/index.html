<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/pwa-192x192.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#15803d" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#15803d" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#166534" />
    <meta name="description" content="Sistema de registro de asistencia y actividades con funcionalidad offline" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Sembrando Vida" />
    
    <!-- Manifest PWA -->
    <link rel="manifest" href="/manifest.json" />
    
    <!-- iOS Safari Icons -->
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/pwa-512x512.png" />
    
    <!-- Windows Tiles -->
    <meta name="msapplication-TileImage" content="/pwa-192x192.png" />
    <meta name="msapplication-TileColor" content="#15803d" />
    
    <!-- Offline Support -->
    <meta name="offline-support" content="true" />
    
    <!-- Google Fonts para Century Gothic y alternativas -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gothic+A1:wght@400;500;600;700;800;900&family=Nunito+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <title>Sembrando Vida: CONTROL</title>
    
    <style>
      /* Definición de fuente Century Gothic personalizada */
      @font-face {
        font-family: 'Century Gothic';
        src: local('Century Gothic'), local('CenturyGothic'), local('Gothic A1');
        font-display: swap;
      }
      
      /* Clase personalizada para Century Gothic */
      .century-gothic-font {
        font-family: 'Century Gothic', 'Gothic A1', 'Nunito Sans', 'Futura', 'Avenir', 'Proxima Nova', 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif !important;
        font-display: swap;
      }
      
      /* Fondo verde sólido - INMEDIATO */
      html, body {
        background: #15803d !important;
        margin: 0;
        padding: 0;
        min-height: 100vh;
        min-height: 100dvh;
        width: 100vw;
        overflow: hidden;
      }
      
      /* Soporte para safe areas */
      #app {
        min-height: 100vh;
        min-height: 100dvh;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
      }

      /* ========================================
         SPLASH SCREEN - FLORES FLUIDAS APPLE
         ======================================== */
      
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at center, #16a34a 0%, #15803d 40%, #166534 100%);
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), 
                    transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        will-change: opacity, transform;
        overflow: hidden;
      }

      #splash-screen.splash-hidden {
        opacity: 0;
        transform: scale(1.1);
        pointer-events: none;
      }

      /* Gradiente animado de fondo */
      .splash-bg-gradient {
        position: absolute;
        inset: 0;
        background: 
          radial-gradient(circle at 20% 80%, rgba(134, 239, 172, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 80% 20%, rgba(74, 222, 128, 0.12) 0%, transparent 50%),
          radial-gradient(circle at 50% 50%, rgba(187, 247, 208, 0.08) 0%, transparent 60%);
        animation: bgPulse 4s ease-in-out infinite;
      }

      @keyframes bgPulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }

      /* Contenedor de flores/pétalos flotantes */
      .splash-petals-container {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      /* Pétalos circulares flotantes */
      .splash-petal {
        position: absolute;
        border-radius: 50%;
        opacity: 0;
        will-change: transform, opacity;
        filter: blur(0.5px);
      }

      /* Diferentes pétalos con colores y tamaños */
      .petal-1 {
        width: 80px; height: 80px;
        top: 10%; left: 5%;
        background: radial-gradient(circle at 30% 30%, rgba(187, 247, 208, 0.5), rgba(134, 239, 172, 0.2));
        animation: petalFloat1 8s ease-in-out infinite, petalAppear 1s 0.1s ease-out forwards;
      }

      .petal-2 {
        width: 60px; height: 60px;
        top: 20%; right: 10%;
        background: radial-gradient(circle at 40% 40%, rgba(134, 239, 172, 0.45), rgba(74, 222, 128, 0.15));
        animation: petalFloat2 10s ease-in-out infinite, petalAppear 1s 0.2s ease-out forwards;
      }

      .petal-3 {
        width: 100px; height: 100px;
        bottom: 25%; left: 3%;
        background: radial-gradient(circle at 50% 30%, rgba(187, 247, 208, 0.35), rgba(134, 239, 172, 0.1));
        animation: petalFloat3 12s ease-in-out infinite, petalAppear 1s 0.3s ease-out forwards;
      }

      .petal-4 {
        width: 50px; height: 50px;
        top: 45%; right: 8%;
        background: radial-gradient(circle at 30% 50%, rgba(74, 222, 128, 0.4), rgba(34, 197, 94, 0.15));
        animation: petalFloat4 9s ease-in-out infinite, petalAppear 1s 0.15s ease-out forwards;
      }

      .petal-5 {
        width: 70px; height: 70px;
        bottom: 15%; right: 15%;
        background: radial-gradient(circle at 40% 40%, rgba(134, 239, 172, 0.4), rgba(187, 247, 208, 0.1));
        animation: petalFloat5 11s ease-in-out infinite, petalAppear 1s 0.25s ease-out forwards;
      }

      .petal-6 {
        width: 90px; height: 90px;
        top: 65%; left: 12%;
        background: radial-gradient(circle at 60% 40%, rgba(187, 247, 208, 0.3), rgba(134, 239, 172, 0.08));
        animation: petalFloat6 14s ease-in-out infinite, petalAppear 1s 0.35s ease-out forwards;
      }

      .petal-7 {
        width: 45px; height: 45px;
        top: 8%; left: 50%;
        background: radial-gradient(circle at 50% 50%, rgba(74, 222, 128, 0.45), rgba(34, 197, 94, 0.1));
        animation: petalFloat7 7s ease-in-out infinite, petalAppear 1s 0.12s ease-out forwards;
      }

      .petal-8 {
        width: 65px; height: 65px;
        bottom: 8%; left: 40%;
        background: radial-gradient(circle at 35% 35%, rgba(134, 239, 172, 0.38), rgba(187, 247, 208, 0.12));
        animation: petalFloat8 13s ease-in-out infinite, petalAppear 1s 0.28s ease-out forwards;
      }

      .petal-9 {
        width: 55px; height: 55px;
        top: 35%; left: 20%;
        background: radial-gradient(circle at 45% 45%, rgba(187, 247, 208, 0.42), rgba(74, 222, 128, 0.1));
        animation: petalFloat9 9s ease-in-out infinite, petalAppear 1s 0.18s ease-out forwards;
      }

      .petal-10 {
        width: 75px; height: 75px;
        bottom: 40%; right: 5%;
        background: radial-gradient(circle at 55% 35%, rgba(134, 239, 172, 0.35), rgba(187, 247, 208, 0.08));
        animation: petalFloat10 11s ease-in-out infinite, petalAppear 1s 0.32s ease-out forwards;
      }

      /* Animaciones de flotación orgánica estilo Apple */
      @keyframes petalFloat1 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        20% { transform: translate(15px, -20px) rotate(8deg) scale(1.05); }
        40% { transform: translate(-10px, -35px) rotate(-5deg) scale(0.95); }
        60% { transform: translate(20px, -15px) rotate(12deg) scale(1.08); }
        80% { transform: translate(-5px, -25px) rotate(-8deg) scale(0.98); }
      }

      @keyframes petalFloat2 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        25% { transform: translate(-20px, 15px) rotate(-10deg) scale(1.06); }
        50% { transform: translate(10px, 30px) rotate(6deg) scale(0.94); }
        75% { transform: translate(-15px, 10px) rotate(-6deg) scale(1.04); }
      }

      @keyframes petalFloat3 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        16% { transform: translate(18px, -15px) rotate(6deg) scale(1.04); }
        33% { transform: translate(8px, 12px) rotate(-8deg) scale(0.96); }
        50% { transform: translate(-12px, -8px) rotate(10deg) scale(1.06); }
        66% { transform: translate(-5px, 18px) rotate(-4deg) scale(0.98); }
        83% { transform: translate(15px, 5px) rotate(8deg) scale(1.02); }
      }

      @keyframes petalFloat4 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        33% { transform: translate(-18px, -22px) rotate(-12deg) scale(1.08); }
        66% { transform: translate(12px, -10px) rotate(8deg) scale(0.95); }
      }

      @keyframes petalFloat5 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        20% { transform: translate(-12px, 18px) rotate(-6deg) scale(1.05); }
        40% { transform: translate(8px, -12px) rotate(10deg) scale(0.97); }
        60% { transform: translate(-18px, 8px) rotate(-10deg) scale(1.04); }
        80% { transform: translate(15px, 20px) rotate(6deg) scale(0.96); }
      }

      @keyframes petalFloat6 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        14% { transform: translate(8px, -12px) rotate(5deg) scale(1.03); }
        28% { transform: translate(-6px, 8px) rotate(-8deg) scale(0.97); }
        42% { transform: translate(12px, 15px) rotate(10deg) scale(1.05); }
        57% { transform: translate(-10px, -5px) rotate(-6deg) scale(0.98); }
        71% { transform: translate(5px, -15px) rotate(8deg) scale(1.02); }
        85% { transform: translate(-12px, 10px) rotate(-10deg) scale(0.99); }
      }

      @keyframes petalFloat7 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        25% { transform: translate(15px, 18px) rotate(15deg) scale(1.1); }
        50% { transform: translate(-10px, 25px) rotate(-8deg) scale(0.92); }
        75% { transform: translate(20px, 8px) rotate(10deg) scale(1.05); }
      }

      @keyframes petalFloat8 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        33% { transform: translate(20px, -18px) rotate(12deg) scale(1.08); }
        66% { transform: translate(-8px, -30px) rotate(-6deg) scale(0.95); }
      }

      @keyframes petalFloat9 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        20% { transform: translate(-15px, -12px) rotate(-8deg) scale(1.04); }
        40% { transform: translate(10px, -20px) rotate(6deg) scale(0.96); }
        60% { transform: translate(-8px, 10px) rotate(-10deg) scale(1.06); }
        80% { transform: translate(18px, -8px) rotate(12deg) scale(0.98); }
      }

      @keyframes petalFloat10 {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        25% { transform: translate(-20px, 12px) rotate(-10deg) scale(1.05); }
        50% { transform: translate(15px, -15px) rotate(8deg) scale(0.95); }
        75% { transform: translate(-10px, -25px) rotate(-6deg) scale(1.08); }
      }

      @keyframes petalAppear {
        from { opacity: 0; transform: scale(0.3); }
        to { opacity: 1; transform: scale(1); }
      }

      /* Centro con círculos animados */
      .splash-center {
        position: relative;
        z-index: 10;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }

      /* Círculos concéntricos pulsantes */
      .splash-circles {
        position: relative;
        width: 140px;
        height: 140px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .splash-circle {
        position: absolute;
        border-radius: 50%;
        border: 2px solid rgba(255, 255, 255, 0.15);
        animation: circleExpand 3s ease-out infinite;
      }

      .splash-circle:nth-child(1) {
        width: 60px; height: 60px;
        animation-delay: 0s;
      }

      .splash-circle:nth-child(2) {
        width: 90px; height: 90px;
        animation-delay: 0.5s;
      }

      .splash-circle:nth-child(3) {
        width: 120px; height: 120px;
        animation-delay: 1s;
      }

      .splash-circle:nth-child(4) {
        width: 150px; height: 150px;
        animation-delay: 1.5s;
      }

      @keyframes circleExpand {
        0% { 
          transform: scale(0.8); 
          opacity: 0.6;
          border-color: rgba(187, 247, 208, 0.4);
        }
        50% { 
          opacity: 0.3;
          border-color: rgba(134, 239, 172, 0.25);
        }
        100% { 
          transform: scale(1.4); 
          opacity: 0;
          border-color: rgba(255, 255, 255, 0.05);
        }
      }

      /* Punto central brillante */
      .splash-core {
        position: absolute;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.95), rgba(187, 247, 208, 0.8));
        box-shadow: 
          0 0 30px rgba(187, 247, 208, 0.6),
          0 0 60px rgba(134, 239, 172, 0.4),
          0 0 90px rgba(74, 222, 128, 0.2);
        animation: corePulse 2s ease-in-out infinite, coreAppear 0.8s ease-out forwards;
        opacity: 0;
      }

      @keyframes coreAppear {
        from { opacity: 0; transform: scale(0); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes corePulse {
        0%, 100% { 
          transform: scale(1);
          box-shadow: 
            0 0 30px rgba(187, 247, 208, 0.6),
            0 0 60px rgba(134, 239, 172, 0.4),
            0 0 90px rgba(74, 222, 128, 0.2);
        }
        50% { 
          transform: scale(1.15);
          box-shadow: 
            0 0 40px rgba(187, 247, 208, 0.7),
            0 0 80px rgba(134, 239, 172, 0.5),
            0 0 120px rgba(74, 222, 128, 0.3);
        }
      }

      /* Texto de la marca */
      .splash-brand {
        text-align: center;
        opacity: 0;
        animation: textFadeUp 1s ease-out 0.6s forwards;
      }

      @keyframes textFadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
          filter: blur(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }

      .splash-title {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
        font-size: 26px;
        font-weight: 600;
        letter-spacing: -0.3px;
        color: rgba(255, 255, 255, 0.95);
        margin: 0;
        text-shadow: 0 2px 20px rgba(0, 0, 0, 0.15);
      }

      .splash-subtitle {
        font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', system-ui, sans-serif;
        font-size: 13px;
        font-weight: 400;
        color: rgba(255, 255, 255, 0.6);
        margin: 8px 0 0 0;
        letter-spacing: 0.5px;
      }

      /* Indicador de carga sutil */
      .splash-loader {
        position: absolute;
        bottom: 12%;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        opacity: 0;
        animation: loaderFadeIn 0.8s ease-out 1s forwards;
      }

      @keyframes loaderFadeIn {
        to { opacity: 1; }
      }

      .splash-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.4);
        animation: dotBounce 1.4s ease-in-out infinite;
      }

      .splash-dot:nth-child(1) { animation-delay: 0s; }
      .splash-dot:nth-child(2) { animation-delay: 0.2s; }
      .splash-dot:nth-child(3) { animation-delay: 0.4s; }

      @keyframes dotBounce {
        0%, 80%, 100% { 
          transform: scale(1);
          background: rgba(255, 255, 255, 0.4);
        }
        40% { 
          transform: scale(1.3);
          background: rgba(255, 255, 255, 0.9);
        }
      }

      /* Reducir animaciones para usuarios que lo prefieren */
      @media (prefers-reduced-motion: reduce) {
        .splash-petal,
        .splash-circle,
        .splash-core,
        .splash-dot,
        .splash-bg-gradient {
          animation: none !important;
        }
        
        .splash-petal { opacity: 0.3; }
        .splash-core { opacity: 1; transform: scale(1); }
        .splash-brand { opacity: 1; }
        .splash-loader { opacity: 1; }
        .splash-dot { background: rgba(255, 255, 255, 0.7); }
      }
    </style>
  </head>
  <body style="background: #15803d; margin: 0; padding: 0;">
    
    <!-- SPLASH SCREEN - Animación de flores fluida estilo Apple -->
    <div id="splash-screen">
      <!-- Gradiente animado de fondo -->
      <div class="splash-bg-gradient"></div>
      
      <!-- Pétalos/círculos flotantes -->
      <div class="splash-petals-container">
        <div class="splash-petal petal-1"></div>
        <div class="splash-petal petal-2"></div>
        <div class="splash-petal petal-3"></div>
        <div class="splash-petal petal-4"></div>
        <div class="splash-petal petal-5"></div>
        <div class="splash-petal petal-6"></div>
        <div class="splash-petal petal-7"></div>
        <div class="splash-petal petal-8"></div>
        <div class="splash-petal petal-9"></div>
        <div class="splash-petal petal-10"></div>
      </div>

      <!-- Centro con círculos pulsantes -->
      <div class="splash-center">
        <div class="splash-circles">
          <div class="splash-circle"></div>
          <div class="splash-circle"></div>
          <div class="splash-circle"></div>
          <div class="splash-circle"></div>
          <div class="splash-core"></div>
        </div>

        <div class="splash-brand">
          <h1 class="splash-title">Sembrando Vida</h1>
          <p class="splash-subtitle">Cargando...</p>
        </div>
      </div>

      <!-- Indicador de carga con puntos -->
      <div class="splash-loader">
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>
    
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    
    <noscript>
      <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif; background: #15803d; color: white;">
        <h1>JavaScript Requerido</h1>
        <p>Esta aplicación requiere JavaScript para funcionar correctamente.</p>
        <p>Por favor, habilita JavaScript en tu navegador e intenta nuevamente.</p>
      </div>
    </noscript>

    <script>
      // Ocultar splash screen cuando Vue esté listo
      (function() {
        var splashHidden = false;
        
        function hideSplash() {
          if (splashHidden) return;
          splashHidden = true;
          
          var splash = document.getElementById('splash-screen');
          if (splash) {
            splash.classList.add('splash-hidden');
            setTimeout(function() {
              splash.style.display = 'none';
            }, 900);
          }
        }
        
        // Método 1: Escuchar evento personalizado de Vue
        window.addEventListener('app-ready', hideSplash);
        
        // Método 2: Esperar a que el #app tenga contenido
        var checkInterval = setInterval(function() {
          var app = document.getElementById('app');
          if (app && app.children.length > 0) {
            clearInterval(checkInterval);
            setTimeout(hideSplash, 400);
          }
        }, 100);
        
        // Método 3: Timeout máximo de seguridad (10 segundos)
        setTimeout(function() {
          clearInterval(checkInterval);
          hideSplash();
        }, 10000);
      })();
    </script>
  </body>
</html>
